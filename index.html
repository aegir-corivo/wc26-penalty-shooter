<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC26 Penalty Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
        }
        canvas {
            border: 2px solid #333;
            image-rendering: pixelated;
        }
        #mute-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border: 2px solid #555;
            border-radius: 6px;
            background: #222;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
            z-index: 10;
        }
        #mute-btn:hover {
            background: #333;
            border-color: #FFD700;
        }
        #mute-btn:focus-visible {
            outline: 2px solid #FFD700;
            outline-offset: 2px;
        }
        .game-wrapper {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="game" width="800" height="600"></canvas>
        <button id="mute-btn" aria-label="Toggle audio mute" title="Toggle Mute (M)">🔊</button>
    </div>
    <script src="audio.js"></script>
    <script src="multiplayer.js"></script>
    <script src="game.js"></script>
</body>
</html>
